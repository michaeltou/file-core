  chunk_size: 10000 #xml文件读取的块大小，默认100000条记录。

# 系统是启动多个进程，然后每个进程启动多个线程，每个线程处理一个请求
# 这里是对单个进程的限流配置，控制进程维度处理的并发数，请注意：不是所有进程的总线程数控制。
# 限流次数要小于单个进程的线程数才能生效，否则会导致2个结果：
#  1：这里的配置无效[原因：限流次数都大于系统开辟的线程数，开辟的线程数都在处理请求，无发通过外部调用判断是否触发限流，这样就达不到限流效果]
#  2：外部请求将等待直至超时，得不到及时的响应，也得不到限流反馈，只能得到超时反馈。
limit:
  calls: 9 # 调用次数。 这里建议的配置是：单个进程的线程数-1。  备注:单个进程的线程数在gunicorn.conf.py中配置。
  period: 1 # 单位秒


